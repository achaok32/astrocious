<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Astrocious by cinematic texts</title>
  <style>
    :root {
      --bg: #f4eadc;
      --card: #fff8ee;
      --accent: #8b5e3c;
      --accent2: #c48a4a;
      --text: #3b2a1f;
      --muted: #7a5f48;
      --paper: #fdf7ed;
      --ink: #2d2119;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      background: linear-gradient(135deg, #f7efe2 0%, #efe0c8 45%, #e7d1b0 100%);
      color: var(--text);
      font-family: 'Georgia', 'Times New Roman', serif;
      position: relative;
      overflow: hidden;
    }

    .app {
      width: min(100%, 460px);
      background: var(--card);
      border: 1px solid rgba(107, 78, 51, 0.16);
      border-radius: 20px;
      padding: 28px;
      box-shadow: 0 16px 40px rgba(76, 52, 35, 0.18);
      position: relative;
      overflow: hidden;
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transform: translateY(18px);
      transition: opacity 0.8s ease, transform 0.8s ease, visibility 0.8s ease;
    }

    .app.visible {
      opacity: 1;
      visibility: visible;
      pointer-events: auto;
      transform: translateY(0);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 1.7rem;
      text-align: center;
      font-family: 'Georgia', 'Times New Roman', serif;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
      color: var(--ink);
      text-shadow: 0 1px 0 rgba(255,255,255,0.8);
    }
    .sub { margin: 0 0 20px; color: var(--muted); text-align: center; font-size: 0.95rem; }

    .cover {
      width: 100%;
      aspect-ratio: 1 / 1;
      border-radius: 16px;
      overflow: hidden;
      margin-bottom: 18px;
      background: var(--paper);
      border: 1px solid rgba(107, 78, 51, 0.16);
    }

    .cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .status {
      text-align: center;
      color: var(--muted);
      font-size: 0.9rem;
      margin-bottom: 16px;
      min-height: 1.3em;
    }

    .controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 14px;
      margin-top: 6px;
    }

    .timeline {
      margin-top: 16px;
      padding-top: 8px;
      border-top: 1px solid rgba(107, 78, 51, 0.12);
    }

    .timeline input[type="range"] {
      width: 100%;
      appearance: none;
      height: 6px;
      border-radius: 999px;
      background: rgba(120, 80, 45, 0.16);
      outline: none;
      cursor: pointer;
    }

    .timeline input[type="range"]::-webkit-slider-thumb {
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      border: 2px solid #fff;
      box-shadow: 0 0 0 2px rgba(120, 80, 45, 0.2);
    }

    .timeline .time-row {
      display: flex;
      justify-content: space-between;
      margin-top: 6px;
      color: var(--muted);
      font-size: 0.8rem;
    }

    button {
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    button:hover { transform: scale(1.04); }
    button:active { transform: scale(0.98); }

    .play-btn {
      width: 62px;
      height: 62px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid;
      place-items: center;
      color: white;
      box-shadow: 0 8px 24px rgba(120, 80, 45, 0.2);
    }

    .play-btn svg { width: 24px; height: 24px; fill: #fff; }

    .secondary-btn {
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(120, 80, 45, 0.08);
      color: var(--text);
      font-size: 0.85rem;
    }

    .intro-play {
      position: fixed;
      inset: 0;
      margin: auto;
      width: 116px;
      height: 116px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      display: grid;
      place-items: center;
      color: white;
      box-shadow: 0 16px 36px rgba(120, 80, 45, 0.28);
      z-index: 3;
      animation: introPulse 1.6s ease-in-out infinite;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }

    .intro-play.hidden {
      opacity: 0;
      transform: scale(0.9);
      pointer-events: none;
    }

    .intro-play svg { width: 40px; height: 40px; fill: #fff; }

    @keyframes introPulse {
      0%, 100% { transform: scale(1); box-shadow: 0 16px 36px rgba(120, 80, 45, 0.28); }
      50% { transform: scale(1.05); box-shadow: 0 22px 48px rgba(120, 80, 45, 0.34); }
    }

    audio { display: none; }

    .hint {
      margin-top: 16px;
      text-align: center;
      color: var(--muted);
      font-size: 0.8rem;
    }

    .emoji-bg {
      position: fixed;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 0;
      opacity: 0.24;
    }

    .emoji-bg span {
      position: absolute;
      font-size: 1.6rem;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,0.08));
      user-select: none;
    }

    .side-video-panel {
      position: fixed;
      top: 50%;
      right: 24px;
      width: min(28vw, 220px);
      max-width: 220px;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 14px 36px rgba(40, 24, 14, 0.22);
      border: 1px solid rgba(255,255,255,0.3);
      background: transparent;
      z-index: 2;
      opacity: 0;
      display: none;
      pointer-events: none;
      transition: none;
    }

    .side-video-panel.visible {
      opacity: 1;
      display: block;
      pointer-events: auto;
    }

    .side-video-panel video {
      display: block;
      width: 100%;
      height: auto;
      object-fit: cover;
      background: transparent;
      opacity: 1;
    }

    @media (max-width: 900px) {
      .side-video-panel {
        right: 12px;
        bottom: 12px;
        top: auto;
        width: min(36vw, 170px);
        transform: translateY(0) translateX(18px);
      }

      .side-video-panel.visible {
        transform: translateY(0) translateX(0);
      }

      .side-video-panel.fading-out {
        transform: translateY(0) translateX(18px);
      }
    }
  </style>
</head>
<body>
  <div class="emoji-bg" id="emojiBg" aria-hidden="true"></div>
  <div class="side-video-panel" id="sideVideoPanel" aria-hidden="true">
    <video id="sideVideo" muted playsinline preload="metadata" src="./achaok1.mp4"></video>
  </div>
  <button class="intro-play" id="introPlay" aria-label="Start playback">
    <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
  </button>

  <div class="app" id="playerApp">
    <h1>Astrocious</h1>
    <p class="sub">her was best</p>

    <div class="cover">
      <img src="./b.png" alt="Album cover" />
    </div>
    <div class="status" id="status">achaok</div>

    <div class="controls">
      <button class="play-btn" id="playBtn" aria-label="Start playback">
        <svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </button>
      <button class="secondary-btn" id="restartBtn">phirse?</button>
    </div>

    <div class="timeline">
      <input type="range" id="timelineBar" min="0" max="100" step="0.1" value="0" />
      <div class="time-row">
        <span id="currentTime">0:00</span>
        <span id="durationTime">0:00</span>
      </div>
    </div>

    <div class="hint">she broke my eyes and stole my glasses from me</div>
  </div>

  <audio id="audioPlayer" preload="auto">
    <source src="./uploaded_audio.mp3" type="audio/mpeg" />
  </audio>

  <script>
    (function () {
      const audio = document.getElementById('audioPlayer');
      const appEl = document.getElementById('playerApp');
      const emojiBg = document.getElementById('emojiBg');
      const introPlayBtn = document.getElementById('introPlay');
      const playBtn = document.getElementById('playBtn');
      const restartBtn = document.getElementById('restartBtn');
      const statusEl = document.getElementById('status');
      const timelineBar = document.getElementById('timelineBar');
      const currentTimeEl = document.getElementById('currentTime');
      const durationTimeEl = document.getElementById('durationTime');
      const sideVideoPanel = document.getElementById('sideVideoPanel');
      const sideVideo = document.getElementById('sideVideo');

      let audioCtx = null;
      let sourceNode = null;
      let gainNode = null;
      let isPlaying = false;
      let timelineTick = null;
      let isSeeking = false;
      let wasPlayingBeforeSeek = false;
      let sideVideoShown = false;
      let sideVideoFadingOut = false;
      let sideVideoPlaylist = ['./achaok1.mp4', './achaok2.mp4'];
      let sideVideoIndex = 0;

      function setStatus(text) {
        statusEl.textContent = text;
      }

      function createEmojiBackground() {
        const pieces = ['💔', '💔', '💔', '💔', '💔'];
        const count = 18;
        for (let i = 0; i < count; i += 1) {
          const span = document.createElement('span');
          span.textContent = pieces[i % pieces.length];
          span.style.left = `${Math.random() * 100}%`;
          span.style.top = `${Math.random() * 100}%`;
          span.style.fontSize = `${0.9 + Math.random() * 1.4}rem`;
          span.style.transform = `rotate(${Math.random() * 24 - 12}deg)`;
          span.style.opacity = `${0.16 + Math.random() * 0.2}`;
          emojiBg.appendChild(span);
        }
      }

      function getAudioGraph() {
        if (!audioCtx) {
          const Ctx = window.AudioContext || window.webkitAudioContext;
          audioCtx = new Ctx();
          sourceNode = audioCtx.createMediaElementSource(audio);
          gainNode = audioCtx.createGain();
          gainNode.gain.value = 0;
          sourceNode.connect(gainNode);
          gainNode.connect(audioCtx.destination);
        }
        return audioCtx;
      }

      function fadeGain(target, durationMs) {
        if (!gainNode || !audioCtx) return;
        const now = audioCtx.currentTime;
        gainNode.gain.cancelScheduledValues(now);
        gainNode.gain.setValueAtTime(gainNode.gain.value, now);
        gainNode.gain.linearRampToValueAtTime(target, now + durationMs / 1000);
      }

      function formatTime(sec) {
        if (!isFinite(sec) || isNaN(sec)) return '0:00';
        const minutes = Math.floor(sec / 60);
        const seconds = Math.floor(sec % 60);
        return `${minutes}:${seconds.toString().padStart(2, '0')}`;
      }

      function resetSideVideo() {
        sideVideoPanel.classList.remove('visible');
        sideVideoPanel.style.display = 'none';
        sideVideoPanel.setAttribute('aria-hidden', 'true');
        sideVideo.style.opacity = '1';
        sideVideo.pause();
        sideVideo.currentTime = 0;
        sideVideo.src = sideVideoPlaylist[0];
        sideVideo.load();
        sideVideoIndex = 0;
        sideVideoShown = false;
        sideVideoFadingOut = false;
      }

      function showSideVideo() {
        if (sideVideoShown || sideVideoFadingOut) return;
        sideVideoPanel.style.display = 'block';
        sideVideoPanel.setAttribute('aria-hidden', 'false');
        sideVideo.style.opacity = '1';
        sideVideoShown = true;
        sideVideoFadingOut = false;
        sideVideoPanel.classList.add('visible');
      }

      function syncSideVideoPlayback(shouldPlay) {
        if (!shouldPlay) {
          if (sideVideoShown && !sideVideoFadingOut) {
            sideVideo.pause();
          }
          return;
        }

        if (!sideVideoShown && !sideVideoFadingOut) {
          showSideVideo();
        }

        if (sideVideoShown && !sideVideoFadingOut && sideVideo.readyState >= 2) {
          sideVideo.muted = true;
          sideVideo.play().catch(() => {});
        }
      }

      function playNextSideVideo() {
        if (sideVideoIndex < sideVideoPlaylist.length - 1) {
          sideVideoIndex += 1;
          sideVideo.src = sideVideoPlaylist[sideVideoIndex];
          sideVideo.load();
          sideVideo.currentTime = 0;
          sideVideo.muted = true;
          showSideVideo();
          sideVideo.play().catch(() => {});
        } else {
          fadeOutSideVideo();
        }
      }

      function fadeOutSideVideo() {
        if (!sideVideoShown || sideVideoFadingOut) return;
        sideVideoFadingOut = true;
        sideVideo.pause();
        resetSideVideo();
      }

      function updateTimeline() {
        if (!isPlaying) return;
        const current = audio.currentTime;
        const total = audio.duration || 0;
        if (total > 0) {
          timelineBar.max = total;
          timelineBar.value = current;
          currentTimeEl.textContent = formatTime(current);
          durationTimeEl.textContent = formatTime(total);
        }

        syncSideVideoPlayback(isPlaying);

        if (sideVideoShown && sideVideo.duration && sideVideo.currentTime >= sideVideo.duration - 0.7) {
          fadeOutSideVideo();
        }

        timelineTick = requestAnimationFrame(updateTimeline);
      }

      function startTimeline() {
        cancelAnimationFrame(timelineTick);
        updateTimeline();
      }

      function stopTimeline() {
        cancelAnimationFrame(timelineTick);
        timelineTick = null;
      }

      createEmojiBackground();

      function revealPlayer() {
        appEl.classList.add('visible');
        introPlayBtn.classList.add('hidden');
      }

      function resetIntroState() {
        appEl.classList.remove('visible');
        introPlayBtn.classList.remove('hidden');
      }

      async function startPlayback() {
        const ctx = getAudioGraph();
        if (ctx.state === 'suspended') {
          await ctx.resume();
        }

        if (audio.ended || audio.currentTime >= (audio.duration || 0) - 0.1 || audio.currentTime <= 0.01) {
          audio.currentTime = 0;
        }

        revealPlayer();
        setStatus('i really fw her');

        try {
          if (audio.readyState < 2) {
            await new Promise((resolve, reject) => {
              const cleanup = () => {
                audio.removeEventListener('canplaythrough', onCanPlay);
                audio.removeEventListener('error', onError);
              };
              const onCanPlay = () => {
                cleanup();
                resolve();
              };
              const onError = () => {
                cleanup();
                reject(new Error('Audio load failed'));
              };
              audio.addEventListener('canplaythrough', onCanPlay, { once: true });
              audio.addEventListener('error', onError, { once: true });
              audio.load();
            });
          }

          await audio.play();
          isPlaying = true;
          playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>';
          syncSideVideoPlayback(true);
          fadeGain(1, 1600);
          startTimeline();
        } catch (error) {
          isPlaying = false;
          stopTimeline();
          resetIntroState();
          setStatus('Playback was blocked. Press start again.');
        }
      }

      function pauseTrack() {
        if (!isPlaying) return;
        fadeGain(0, 700);
        syncSideVideoPlayback(false);
        audio.pause();
        isPlaying = false;
        stopTimeline();
        playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        setStatus('so it doesn\'t matter to u achaok');
      }

      function handlePlayToggle() {
        if (isPlaying) {
          pauseTrack();
        } else {
          startPlayback();
        }
      }

      playBtn.addEventListener('click', handlePlayToggle);
      introPlayBtn.addEventListener('click', handlePlayToggle);

      restartBtn.addEventListener('click', () => {
        audio.pause();
        audio.currentTime = 0;
        isPlaying = false;
        stopTimeline();
        fadeGain(0, 0);
        playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        resetIntroState();
        resetSideVideo();
        setStatus('areyok');
      });

      sideVideo.addEventListener('loadedmetadata', () => {
        if (sideVideoShown) {
          sideVideo.style.opacity = '1';
        }
      });

      sideVideo.addEventListener('ended', () => {
        playNextSideVideo();
      });

      audio.addEventListener('ended', () => {
        isPlaying = false;
        stopTimeline();
        fadeGain(0, 900);
        playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        fadeOutSideVideo();
        setStatus('Playback finished');
      });

      timelineBar.addEventListener('pointerdown', () => {
        if (isPlaying) {
          wasPlayingBeforeSeek = true;
          syncSideVideoPlayback(false);
          audio.pause();
          isPlaying = false;
          stopTimeline();
          playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>';
        } else {
          wasPlayingBeforeSeek = false;
        }
        isSeeking = true;
      });

      timelineBar.addEventListener('input', () => {
        const newTime = parseFloat(timelineBar.value);
        audio.currentTime = newTime;
        currentTimeEl.textContent = formatTime(newTime);
      });

      function finishSeek() {
        if (!isSeeking) return;
        isSeeking = false;
        if (wasPlayingBeforeSeek) {
          audio.play().then(() => {
            isPlaying = true;
            playBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M6 5h4v14H6zm8 0h4v14h-4z"/></svg>';
            syncSideVideoPlayback(true);
            fadeGain(1, 400);
            startTimeline();
          }).catch(() => {
            isPlaying = false;
            stopTimeline();
            setStatus('Playback was blocked. Press start again.');
          });
        }
        wasPlayingBeforeSeek = false;
      }

      timelineBar.addEventListener('change', finishSeek);
      timelineBar.addEventListener('pointerup', finishSeek);
      timelineBar.addEventListener('pointerleave', finishSeek);
    })();
  </script>
</body>
</html>
